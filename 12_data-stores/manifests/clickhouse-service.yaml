# ClickHouse headless Service вҖ” StatefulSetм—җ м•Ҳм •м Ғ DNS л¶Җм—¬
# clusterIP: None вҶ’ нҢҢл“ңлі„ DNS(clickhouse-0.clickhouse.<ns>.svc)лЎң м§Ғм ‘ м ‘к·ј
# нҒҙлқјмқҙм–ёнҠё(DBeaver/Grafana)лҠ” port-forward лҳҗлҠ” мқҙ Service мқҙлҰ„мңјлЎң л¶ҷлҠ”лӢӨ
# рҹ“– Headless Service: https://kubernetes.io/docs/concepts/services-networking/service/#headless-services
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  labels:
    app: clickhouse
spec:
  clusterIP: None
  selector:
    app: clickhouse
  ports:
    - { name: http,   port: 8123, targetPort: 8123 }
    - { name: native, port: 9000, targetPort: 9000 }
