# oauth2-proxy — (B) --upstream 직접 프록시 모드. oauth2-proxy가 인증 + path 라우팅을 모두 담당.
# host는 안 보고 path로만 가른다: /api/ → backend, 나머지 → frontend(catch-all /).
# mode A와 같은 Deployment 이름이라 apply하면 교체된다(둘을 동시에 띄우지 않는다).
# 📖 upstream/경로 처리: https://oauth2-proxy.github.io/oauth2-proxy/configuration/overview/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
spec:
  replicas: 1
  selector:
    matchLabels: { app: oauth2-proxy }
  template:
    metadata:
      labels: { app: oauth2-proxy }
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.3
          args:
            - --provider=keycloak-oidc
            - --oidc-issuer-url=http://keycloak.127.0.0.1.nip.io/realms/lab
            - --client-id=oauth2-proxy
            - --redirect-url=http://app.127.0.0.1.nip.io/oauth2/callback
            - --email-domain=*
            - --insecure-oidc-allow-unverified-email=true
            - --cookie-secure=false
            - --http-address=0.0.0.0:4180
            - --reverse-proxy=true
            # (B) 핵심: 직접 프록시할 upstream. trailing slash 규칙 — /api/ 라야 하위까지 잡힌다.
            - --upstream=http://backend.default.svc.cluster.local/api/
            - --upstream=http://frontend.default.svc.cluster.local/
          env:
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom: { secretKeyRef: { name: oauth2-proxy, key: client-secret } }
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom: { secretKeyRef: { name: oauth2-proxy, key: cookie-secret } }
          ports:
            - containerPort: 4180
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
spec:
  selector: { app: oauth2-proxy }
  ports:
    - port: 4180
      targetPort: 4180
