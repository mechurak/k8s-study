# мөңмҶҢ StatefulSet вҖ” volumeClaimTemplatesлЎң нҢҢл“ңл§ҲлӢӨ м „мҡ© PVC мһҗлҸҷ мғқм„ұ
# Headless ServiceмҷҖ м§қм§Җм–ҙ нҢҢл“ңлі„ DNS(web-0.web...) л¶Җм—¬
# рҹ“– StatefulSet: https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/
apiVersion: v1
kind: Service
metadata:
  name: web
spec:
  clusterIP: None          # Headless (к°ҖмғҒ IP м—ҶмқҢ вҶ’ нҢҢл“ңлі„ DNS)
  selector:
    app: web
  ports:
    - port: 80
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: web
spec:
  serviceName: web         # мң„ Headless Service мқҙлҰ„кіј мқјм№ҳн•ҙм•ј н•ңлӢӨ
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:    # нҢҢл“ңл§ҲлӢӨ data-web-0, data-web-1 PVC мғқм„ұ
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
