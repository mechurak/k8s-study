# PostgreSQL 비밀번호 (학습용 — 평문이 Git에 올라간다!)
# 📖 Secret: https://kubernetes.io/docs/concepts/configuration/secret/
# ⚠️ 실무 GitOps에서 Secret을 평문으로 Git에 두면 안 된다.
#    → Sealed Secrets / SOPS / External Secrets Operator 로 암호화해서 커밋한다.
#    여기서는 ArgoCD 동작 학습이 목적이라 단순화했다.
apiVersion: v1
kind: Secret
metadata:
  name: postgres
  labels:
    app: postgres
type: Opaque
stringData:
  POSTGRES_PASSWORD: devpassword
