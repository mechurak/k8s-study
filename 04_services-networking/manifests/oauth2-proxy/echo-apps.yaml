# 데모 백엔드 — 받은 요청(경로·헤더)을 JSON으로 그대로 echo. 인증 헤더 주입·경로 strip을 눈으로 확인용.
# frontend/backend 두 개: mode B(--upstream)의 path 분기 실습에 쓴다. mode A는 backend만 쓴다.
# 📖 ealen/echo-server: https://github.com/Ealenn/Echo-Server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
        - name: echo
          image: ealen/echo-server:0.9.2
          ports: [{ containerPort: 80 }]
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector: { app: backend }
  ports: [{ port: 80, targetPort: 80 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: echo
          image: ealen/echo-server:0.9.2
          ports: [{ containerPort: 80 }]
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  selector: { app: frontend }
  ports: [{ port: 80, targetPort: 80 }]
